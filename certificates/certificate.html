<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Verified – Z Media Digital</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../images/logo.png" type="image/png" />
  <link rel="stylesheet" href="../css/certificate.css" />
</head>
<body>

<div class="cert-page">

  <!-- Brand -->
  <div class="cert-brand">
    <h1>Z Media Digital</h1>
    <p>Certificate Verification</p>
  </div>

  <!-- Verified Badge -->
  <div class="verified-box">
    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div class="verified-title">✅ Certificate Verified</div>
    <p class="verified-sub">
      This certificate is officially issued by Z Media Digital<br>
      and has been confirmed as authentic.
    </p>
  </div>

  <!-- Certificate Image -->
  <div class="cert-image-section">
    <p>Official Certificate</p>
    <img id="certImg" src="" alt="Internship Certificate" />
  </div>

  <!-- Footer -->
  <footer class="cert-footer">
    © 2026 <a href="https://zmediadigital.github.io/z-media-digital/">Z Media Digital</a>. All Rights Reserved.
  </footer>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) {
    document.getElementById('certImg').src = '../images/certificates/' + id + '.jpg';
  }
</script>

</body>
</html>
